# JuriCode-JP — Continuous Integration
#
# Runs on:
#   - every push to main
#   - every pull request targeting main
#
# Steps:
#   1. Lint (ruff)
#   2. Run pytest across all workspace packages
#   3. Validate every law data file (data/ + examples/) against the IR
#   4. Regenerate the JSON Schema from IR and verify it is in sync
#      (fails if a contributor edits the Pydantic IR without re-exporting
#      the schema — keeps schema/juricode-article.schema.json honest)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint, test, validate
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check tools/

      - name: Ruff (format check)
        run: ruff format --check tools/

      - name: Pytest (all workspace packages)
        # 2026-05-25: tools/parse/v0.2/tests と manifest/tests を追加.
        # v0.2 corpus + manifest 生成パッケージのテストを CI で常時実行する.
        run: |
          pytest tools/shared/tests tools/validate/tests tools/parse/v0.2/tests tools/parse/v0.2/manifest/tests -v

      - name: Validate all law data files
        # 2026-05-25: data/phase1-*/ (v0.1) を archive/v0.1/ に deprecate 済.
        # 本コマンドは data/ 配下のみ走査する (archive/ は対象外、
        # find_data_files() が data/ + examples/ のみを見るため).
        # 結果として v0.2 corpus (data/v0.2/) のみが検証対象になる.
        run: python tools/validate/validate-all.py

      - name: Verify source-manifest hashes (parse pipeline / Layer 3)
        # data/ 配下の _source-manifest.json と Markdown 本文の hash 整合確認.
        # 法令本文の改変・誤転記を CI で機械的に検知する.
        # 2026-05-25: v0.1 corpus を archive/v0.1/ に deprecate. data/v0.2/ 配下の
        # 43 manifests (11,758 articles) が対象となる. archive/ は CI 対象外.
        # 詳細: docs/verification-framework.md /
        #       business/v02-corpus-quality-investigation-2026-05-25.md
        run: python tools/parse/verify.py --path data

      - name: Phase tag consistency check (FU-415 guard, FU-502)
        # 2026-05-26 FU-502: tags[0] が path-derived な phase と一致するかを
        # CI で機械的に検知する. fix-phase-tags.py --check-only は mismatch
        # 1 件でも exit 1 で fail.
        # 過去の bulk-ingest で tags[0] が phase1-police にハードコードされた
        # bug (FU-401 で修正、FU-415 で sweep 完了) の退行を防ぐ.
        # 実 CLI 起動は tools/shared/tests/test_fix_phase_tags_cli.py が
        # smoke test として担保 (FU-504 entry point 修復後の退行検知).
        run: python tools/scripts/fix-phase-tags.py --path data/v0.2 --check-only

      - name: Regenerate JSON Schema and check for drift
        run: |
          python tools/shared/scripts/export-schema.py
          git diff --exit-code schema/juricode-article.schema.json || {
            echo ""
            echo "::error::schema/juricode-article.schema.json is out of sync with the Pydantic IR."
            echo "Run 'python tools/shared/scripts/export-schema.py' locally and commit the result."
            exit 1
          }
